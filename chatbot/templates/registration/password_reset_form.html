<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Password Reset</title>
  </head>
  <body>
    <h2>Reset your password</h2>
    <form method="post">
      {% csrf_token %} {{ form.as_p }}
      <button type="submit">Send reset link</button>
    </form>
    <p><a href="{% url 'login' %}">Back to login</a></p>
  </body>
</html>
